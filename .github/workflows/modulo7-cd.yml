name: Modulo 7 CI/CD + Docker Hub

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "modulo7/**"
      - ".github/workflows/modulo7-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "modulo7/**"
      - ".github/workflows/modulo7-cd.yml"
  workflow_dispatch:

env:
  IMAGE_TRAIN:     ${{ secrets.DOCKERHUB_USERNAME }}/heat-exchanger-train
  IMAGE_INFERENCE: ${{ secrets.DOCKERHUB_USERNAME }}/heat-exchanger-inference

jobs:
  build-train:
    name: Build imagem de treino
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Gerar tags
        id: meta-train
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_TRAIN }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: modulo7
          file: modulo7/Dockerfile.train
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-train.outputs.tags }}
          labels: ${{ steps.meta-train.outputs.labels }}
          cache-from: type=gha,scope=mod7-train
          cache-to: type=gha,scope=mod7-train,mode=max
          outputs: type=docker,dest=/tmp/train.tar
      - uses: actions/upload-artifact@v4
        with:
          name: train-image
          path: /tmp/train.tar
          retention-days: 1

  build-inference:
    name: Build imagem de inferência
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Gerar tags
        id: meta-inference
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_INFERENCE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: modulo7
          file: modulo7/Dockerfile.inference
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-inference.outputs.tags }}
          labels: ${{ steps.meta-inference.outputs.labels }}
          cache-from: type=gha,scope=mod7-inference
          cache-to: type=gha,scope=mod7-inference,mode=max
          outputs: type=docker,dest=/tmp/inference.tar
      - uses: actions/upload-artifact@v4
        with:
          name: inference-image
          path: /tmp/inference.tar
          retention-days: 1

  test:
    name: Teste integração treino + inferência
    runs-on: ubuntu-latest
    needs: [build-train, build-inference]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-image"
          path: /tmp
      - name: Carregar imagens
        run: |
          docker load -i /tmp/train-image/train.tar
          docker load -i /tmp/inference-image/inference.tar
      - run: mkdir -p models
      - name: Executar treino
        run: |
          docker run \
            -v $(pwd)/models:/app/models \
            heat-exchanger-train:${{ github.sha }}
      - name: Verificar artefatos
        run: |
          test -f models/model_latest.pkl && echo "OK: model_latest.pkl"
          test -f models/registry.json    && echo "OK: registry.json"
      - name: Inferência por data
        run: |
          docker run \
            -v $(pwd)/models:/app/models \
            heat-exchanger-inference:${{ github.sha }} \
            python src/inference.py --date 2022-04-15
      - name: Inferência por eficiência
        run: |
          docker run \
            -v $(pwd)/models:/app/models \
            heat-exchanger-inference:${{ github.sha }} \
            python src/inference.py --efficiency 94.5
      - name: Listar versões
        run: |
          docker run \
            -v $(pwd)/models:/app/models \
            heat-exchanger-inference:${{ github.sha }} \
            python src/inference.py --list-versions
