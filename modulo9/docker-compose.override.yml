# =============================================================================
# docker-compose.override.yml  Overrides para DESENVOLVIMENTO
#
# Este arquivo é carregado automaticamente pelo Docker Compose quando você
# roda `docker compose up` sem especificar -f. As configurações aqui
# sobrescrevem/mesclam com docker-compose.yml.
#
# Diferenças dev vs prod:
#   dev  → LOG_LEVEL=DEBUG, hot reload, src/ montado como volume
#   prod → LOG_LEVEL=INFO/WARNING, sem reload, imagem imutável
#
# Para rodar em modo PRODUÇÃO explicitamente (ignorando este arquivo):
#   docker compose -f docker-compose.yml up
# =============================================================================

services:
  serve:
    # Hot reload: uvicorn reinicia automaticamente quando src/ é alterado
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - models:/app/models
      # Monta src/ local no container  alterações no código são refletidas
      # imediatamente sem precisar fazer docker compose build
      - ./src:/app/src
    environment:
      LOG_LEVEL: DEBUG

volumes:
  models:
    name: modulo9_models
